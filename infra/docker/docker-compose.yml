services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4
    container_name: wildvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wildvision
      POSTGRES_USER: wildvision_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wildvision_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - wildvision-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wildvision_user -d wildvision"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for object storage (images)
  minio:
    image: minio/minio:latest
    container_name: wildvision-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wildvision-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
  # Python ML Service
  ml-service:
    image: python:3.10-slim
    container_name: wildvision-ml
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "python -m venv /opt/ml-venv &&
             /opt/ml-venv/bin/pip install --no-cache-dir -r ml_requirements.txt &&
             /opt/ml-venv/bin/uvicorn ml_service:app --host 0.0.0.0 --port 8000"
    environment:
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../../apps/ml-service:/app
      - ml_venv:/opt/ml-venv
      - ml_cache:/cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - wildvision-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      start_period: 5m
      interval: 10s
      timeout: 5s
      retries: 6
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  ml_venv:
    driver: local
  ml_cache:
    driver: local

networks:
  wildvision-network:
    driver: bridge
