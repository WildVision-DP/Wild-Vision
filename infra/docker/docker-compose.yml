services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4
    container_name: wildvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wildvision
      POSTGRES_USER: wildvision_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wildvision_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - wildvision-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wildvision_user -d wildvision"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for object storage (images)
  minio:
    image: minio/minio:latest
    container_name: wildvision-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wildvision-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
  # Python ML Service
  ml-service:
    build:
      context: ../../apps/ml-service
      dockerfile: Dockerfile
    container_name: wildvision-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - wildvision-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  wildvision-network:
    driver: bridge
